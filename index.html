<!DOCTYPE html>
<html>
<head>
    <title>Adivina el Número</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
            padding-top: 50px;
        }
       .caja {
            background: white;
            padding: 30px;
            max-width: 400px;
            margin: auto;
            border-radius: 15px;
            box-shadow: 0 0 10px gray;
        }
        input {
            padding: 10px;
            font-size: 18px;
            width: 100px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
       .btn-comprobar {
            background-color: blue;
        }
       .btn-reiniciar {
            background-color: orange;
        }
        #resultado {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="caja">
        <h1>🎮 Adivina el Número</h1>
        <p>Ingresa un número entre 1 y 20:</p>

        <input type="number" id="numeroUsuario" min="1" max="20">
        <br><br>

        <button class="btn-comprobar" onclick="comprobar()">¡COMPROBAR!</button>
        <button class="btn-reiniciar" onclick="reiniciar()">🔄 REINICIAR</button>

        <div id="resultado"></div>
    </div>

    <script>
        // Generar número secreto entre 1 y 20
        let numeroSecreto = Math.floor(Math.random() * 20) + 1;

        function comprobar() {
            let valorUsuario = document.getElementById("numeroUsuario").value;
            let usuario = parseInt(valorUsuario);
            let res = document.getElementById("resultado");

            // Validar que sea un número válido
            if (isNaN(usuario) || usuario < 1 || usuario > 20) {
                res.innerHTML = "⚠️ Solo números del 1 al 20";
                res.style.color = "orange";
                return;
            }

            // LÓGICA CORREGIDA:
            if (usuario < numeroSecreto) {
                res.innerHTML = "📈 Cantidad mayor";  // Tu número es bajo, el secreto es mayor
                res.style.color = "blue";
            }
            else if (usuario > numeroSecreto) {
                res.innerHTML = "📉 Cantidad menor";  // Tu número es alto, el secreto es menor
                res.style.color = "red";
            }
            else {
                res.innerHTML = "✅ ACERTASTE el número";
                res.style.color = "green";
            }
        }

        function reiniciar() {
            // Generar nuevo número
            numeroSecreto = Math.floor(Math.random() * 20) + 1;
            // Limpiar
            document.getElementById("numeroUsuario").value = "";
            document.getElementById("resultado").innerHTML = "";
        }
    </script>

</body>
</html>
